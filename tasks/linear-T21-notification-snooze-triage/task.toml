version = "1.0"

[metadata]
id = "linear-T21"
name = "Notification snooze triage"
author_name = "Collinear AI"
category = "linear-clone"
tags = ["cua", "linear", "gui-only", "inbox", "notifications", "snooze"]
difficulty = "L2"
difficulty_explanation = "Requires distinguishing blocker notifications from deferrable inbox notifications."
features = ["inbox", "notifications", "snooze"]
tools = ["snooze_notification", "mark_notification_read"]
