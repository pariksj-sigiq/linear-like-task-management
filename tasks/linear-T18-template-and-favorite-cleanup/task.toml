version = "1.0"

[metadata]
id = "linear-T18"
name = "Template and favorite cleanup"
author_name = "Collinear AI"
category = "linear-clone"
tags = ["cua", "linear", "gui-only", "settings", "templates", "favorites"]
difficulty = "L2"
difficulty_explanation = "Requires creating an issue template and pinning a project favorite for a specific user."
features = ["issue-templates", "favorites", "projects"]
tools = ["create_template", "add_favorite"]
