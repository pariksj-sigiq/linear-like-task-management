<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects List - Pixel Perfect Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter Variable", "SF Pro Display", -apple-system, "system-ui", "Segoe UI", Roboto, sans-serif;
            background: #fcfcfc;
            color: #1c1c1c;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #e5e5e5;
            background: #fcfcfc;
            padding-bottom: 8px;
        }

        .header-top {
            display: flex;
            min-height: 44px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 24px 0;
        }

        .header-title {
            font-size: 16px;
            font-weight: 500;
            color: #1c1c1c;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-bottom {
            display: flex;
            min-height: 44px;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 0 24px 8px;
        }

        .tabs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 9999px;
            border: 1px solid #e5e5e5;
            background: #f2f2f2;
            padding: 4px 10px;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
            color: #1c1c1c;
            box-shadow: 0 1px 2px rgba(10, 10, 10, 0.05);
            text-decoration: none;
        }

        .tab-pill svg {
            color: #6f6f6f;
        }

        .icon-btn {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            color: #6f6f6f;
        }

        .icon-btn:hover {
            background: #f2f2f2;
        }

        .table-container {
            margin-top: 16px;
            overflow: hidden;
            border-radius: 8px;
            background: #ffffff;
        }

        .table-header {
            display: grid;
            grid-template-columns: minmax(20rem, 1fr) 9.5rem 6.5rem 4.5rem 8.5rem 4.5rem 5.5rem;
            gap: 24px;
            border-bottom: 1px solid #e5e5e5;
            background: #fefefe;
            padding: 10px 24px;
            font-size: 12px;
            font-weight: 500;
            color: #6f6f6f;
        }

        .table-row {
            display: grid;
            grid-template-columns: minmax(20rem, 1fr) 9.5rem 6.5rem 4.5rem 8.5rem 4.5rem 5.5rem;
            gap: 24px;
            min-height: 48px;
            align-items: center;
            border-bottom: 1px solid #e5e5e5;
            padding: 8px 24px;
            font-size: 13px;
            text-decoration: none;
            color: inherit;
            transition: background-color 150ms;
        }

        .table-row:hover {
            background: #f8f8f8;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .name-cell {
            display: flex;
            min-width: 0;
            align-items: center;
            gap: 10px;
        }

        .name-cell svg {
            flex-shrink: 0;
            color: #6f6f6f;
        }

        .name-cell strong {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
            color: #1c1c1c;
        }

        .health-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6f6f6f;
        }

        .priority-cell, .issues-cell, .target-cell {
            font-size: 13px;
            color: #6f6f6f;
        }

        .avatar {
            display: inline-grid;
            place-items: center;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            border-radius: 9999px;
            background: #d8d5d0;
            font-size: 9px;
            font-weight: 600;
            color: #47443f;
        }

        .status-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-cell span {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            color: #6f6f6f;
        }
    </style>
</head>
<body>

        <div class="header">
            <div class="header-top">

                <div class="header-actions">
                    <button class="icon-btn" aria-label="New project">

                    <button class="icon-btn">

                            <line x1="4" y1="21" x2="4" y2="14"></line>
                            <line x1="4" y1="10" x2="4" y2="3"></line>

                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>

                </div>
            </div>
        </div>

        <div class="table-container">

        </div>
    </div>
</body>
</html>
