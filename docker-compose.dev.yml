services:
  postgres:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloneapp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  clone-app:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.app
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/cloneapp"
    ports:
      - "8030:8030"
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.seed
    environment:
      TOOL_SERVER_URL: "http://clone-app:8030"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/cloneapp"
    depends_on:
      clone-app:
        condition: service_healthy
